name: パスワード保護して公開

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Staticryptをインストール
        run: npm install -g staticrypt

      - name: data.jsをindex.htmlにインライン化
        run: |
          node -e "
            const fs = require('fs');
            let html = fs.readFileSync('index.html', 'utf8');
            const data = fs.readFileSync('data.js', 'utf8');
            html = html.replace(
              /<script src=\"data\.js\"[^>]*><\/script>/,
              '<script>' + data + '</script>'
            );
            fs.writeFileSync('index_with_data.html', html, 'utf8');
            console.log('インライン化完了');
          "

      - name: パスワード保護をかける
        env:
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
        run: |
          staticrypt index_with_data.html \
            --password "$SITE_PASSWORD" \
            --directory encrypted \
            --short
          echo "Staticrypt完了"
          ls -la encrypted/

      - name: 公開フォルダを準備
        run: |
          mkdir -p public
          cp encrypted/index_with_data.html public/index.html
          echo "公開フォルダ準備完了"
          ls -la public/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - uses: actions/deploy-pages@v4
        id: deployment
