name: パスワード保護して公開

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Staticryptをインストール
        run: npm install -g staticrypt

      - name: data.jsをindex.htmlにインライン埋め込み
        run: |
          # data.jsの内容をindex.htmlの<script src="data.js">より前に挿入
          DATA_CONTENT=$(cat data.js)
          sed "s|<script src=\"data.js\"[^>]*></script>|<script>${DATA_CONTENT}</script>|" index.html > index_with_data.html

      - name: パスワード保護をかける
        env:
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
        run: |
          staticrypt index_with_data.html \
            --password "$SITE_PASSWORD" \
            --output index_protected.html \
            --template-title "工事情報検索システム" \
            --template-instructions "パスワードを入力してください" \
            --template-color-primary "#1a3c5e" \
            --template-color-secondary "#2d6a9f" \
            --short

      - name: 公開フォルダを準備
        run: |
          mkdir -p public
          cp index_protected.html public/index.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - uses: actions/deploy-pages@v4
        id: deployment
