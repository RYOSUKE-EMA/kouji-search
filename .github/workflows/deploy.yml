name: パスワード保護して公開

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Staticryptをインストール
        run: npm install -g staticrypt

      - name: index.htmlにパスワード保護をかける（data.jsは別ファイルのまま）
        env:
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
        run: |
          staticrypt index.html \
            --password "$SITE_PASSWORD" \
            --directory encrypted \
            --short
          echo "Staticrypt完了"

      - name: 公開フォルダを準備
        run: |
          mkdir -p public
          cp encrypted/index.html public/index.html
          cp data.js public/data.js
          echo "公開フォルダ準備完了"
          ls -la public/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - uses: actions/deploy-pages@v4
        id: deployment
